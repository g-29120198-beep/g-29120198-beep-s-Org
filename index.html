
<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="SERQI">
    <meta name="application-name" content="SERQI">
    
    <!-- Apple Touch Icons -->
    <link rel="apple-touch-icon" href="https://iili.io/fQdElMx.png">
    <link rel="apple-touch-icon" sizes="152x152" href="https://iili.io/fQdElMx.png">
    <link rel="apple-touch-icon" sizes="180x180" href="https://iili.io/fQdElMx.png">
    <link rel="apple-touch-icon" sizes="167x167" href="https://iili.io/fQdElMx.png">

    <!-- SEO & Trust Meta -->
    <meta name="description" content="Sistem Perekodan Pintar Al-Quran dan Iqra SK Bukit Rambai">
    <meta name="author" content="SK Bukit Rambai">

    <script src="https://cdn.tailwindcss.com"></script>
    <!-- PDF Engine Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f8fafc;
            color: #0f172a;
            margin: 0;
            padding-top: env(safe-area-inset-top);
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior-y: contain;
        }
        #serqi-loader {
            position: fixed;
            inset: 0;
            background: #0f172a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s ease-out;
        }
        .loader-logo {
            width: 100px;
            height: 100px;
            background: white;
            border-radius: 32px;
            padding: 12px;
            animation: pulse 1.5s infinite ease-in-out;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(0.95); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
        }
        @keyframes shake {
          0%, 100% { transform: translateX(0); }
          25% { transform: translateX(-5px); }
          50% { transform: translateX(5px); }
          75% { transform: translateX(-5px); }
        }
        .animate-shake {
          animation: shake 0.4s ease-in-out;
        }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        .no-select {
          -webkit-touch-callout: none;
          -webkit-user-select: none;
          user-select: none;
        }
    </style>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@18.3.1",
    "react/": "https://esm.sh/react@18.3.1/",
    "react-dom": "https://esm.sh/react-dom@18.3.1",
    "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
    "react-dom/": "https://esm.sh/react-dom@18.3.1/",
    "recharts": "https://esm.sh/recharts@2.12.7?external=react,react-dom",
    "lucide-react": "https://esm.sh/lucide-react@0.454.0?external=react",
    "@google/genai": "https://esm.sh/@google/genai@^1.38.0",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.2",
    "vite": "https://esm.sh/vite@^7.3.1"
  }
}
</script>
</head>
<body>
    <div id="serqi-loader">
        <img src="https://iili.io/fQdElMx.png" class="loader-logo" alt="Logo">
        <div style="margin-top: 24px; color: white; font-size: 10px; font-weight: 900; letter-spacing: 4px; opacity: 0.7; text-transform: uppercase;">Menyediakan SERQI...</div>
        <div style="margin-top: 8px; color: #10b981; font-size: 8px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase;">Merekod & Menganalisis Secara Pintar</div>
    </div>
    <div id="root"></div>
    
    <script type="module" src="/index.tsx"></script>

    <script>
        window.addEventListener('load', function() {
            setTimeout(function() {
                var loader = document.getElementById('serqi-loader');
                if (loader) {
                    loader.style.opacity = '0';
                    setTimeout(function() { loader.style.display = 'none'; }, 500);
                }
            }, 500);
        });
    </script>
</body>
</html>
